<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MBTI 20 Persimpangan - Versi Pematangan</title>
  <style>
    :root{
      --bg:#f3efe6;
      --card:#fffaf0;
      --ink:#2d261f;
      --ink2:#3d342c;
      --muted:#74695f;
      --accent:#8a5b32;
      --accent-dark:#5e3b21;
      --accent-soft:#ead8c1;
      --accent2:#5f7d68;
      --line:#ded3c2;
      --soft:#ece2d1;
      --white:#fffdf7;
      --shadow:rgba(45,38,31,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(156,107,62,.18), transparent 32%),
        radial-gradient(circle at 90% 20%, rgba(95,125,104,.16), transparent 30%),
        linear-gradient(180deg,#f7f0e4,var(--bg));
      color:var(--ink);
      min-height:100vh;
    }
    .app{
      width:min(960px, 100%);
      margin:0 auto;
      padding:18px;
    }
    header{
      padding:24px 10px 14px;
      text-align:center;
    }
    .eyebrow{
      letter-spacing:.16em;
      text-transform:uppercase;
      font-size:12px;
      color:var(--accent);
      font-weight:800;
    }
    h1{
      margin:8px 0 8px;
      font-size:clamp(28px, 5vw, 48px);
      line-height:1.04;
    }
    .subtitle{
      color:var(--muted);
      max-width:740px;
      margin:0 auto;
      line-height:1.6;
      font-size:16px;
    }
    .card{
      background:rgba(255,250,240,.92);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:0 18px 60px var(--shadow);
      padding:22px;
      backdrop-filter: blur(10px);
    }
    .hero{
      min-height:190px;
      border-radius:22px;
      border:1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(156,107,62,.14), rgba(95,125,104,.12)),
        repeating-linear-gradient(45deg, rgba(255,255,255,.36) 0 2px, transparent 2px 9px);
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:18px;
      position:relative;
      overflow:hidden;
    }
    .hero:before{
      content:"";
      position:absolute;
      width:280px;
      height:280px;
      border-radius:50%;
      border:34px solid rgba(156,107,62,.09);
      left:-90px;
      top:-80px;
    }
    .hero:after{
      content:"";
      position:absolute;
      width:220px;
      height:220px;
      border-radius:50%;
      border:28px solid rgba(95,125,104,.10);
      right:-80px;
      bottom:-90px;
    }
    .hero-text{
      position:relative;
      z-index:1;
      padding:20px;
      text-align:center;
      color:#453a31;
      font-family: Georgia, serif;
      font-size:22px;
      max-width:680px;
      line-height:1.45;
    }
    .progress-wrap{
      display:flex;
      align-items:center;
      gap:12px;
      margin:8px 0 18px;
    }
    .progress{
      height:10px;
      background:var(--soft);
      border-radius:999px;
      flex:1;
      overflow:hidden;
    }
    .bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      border-radius:999px;
      transition:.25s;
    }
    .count{
      color:var(--muted);
      font-size:14px;
      white-space:nowrap;
      font-weight:700;
    }
    .question{
      font-size:22px;
      line-height:1.35;
      margin:10px 0 18px;
      font-weight:800;
      color:var(--ink);
    }
    .choices{
      display:grid;
      gap:12px;
    }
    .choice{
      border:1.5px solid #d5c7b7;
      background:#fffdf8;
      color:var(--ink);
      border-radius:18px;
      padding:15px 16px;
      cursor:pointer;
      transition:.18s;
      display:grid;
      grid-template-columns:38px 1fr;
      gap:12px;
      align-items:start;
      text-align:left;
      font-size:16px;
      line-height:1.48;
      box-shadow:0 3px 10px rgba(45,38,31,.035);
    }
    .choice span:last-child{
      color:var(--ink2);
      font-weight:650;
    }
    .choice:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 28px rgba(45,38,31,.10);
      border-color:rgba(138,91,50,.65);
      background:#fff9ef;
    }
    .choice.selected{
      border-color:var(--accent-dark);
      background:#ead8c1;
      box-shadow:0 10px 26px rgba(94,59,33,.14);
    }
    .choice.selected span:last-child{
      color:#241b15;
    }
    .badge{
      width:32px;
      height:32px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:#eadfce;
      color:var(--accent-dark);
      font-weight:900;
      border:1px solid rgba(94,59,33,.12);
    }
    .choice.selected .badge{
      background:var(--accent-dark);
      color:white;
      border-color:var(--accent-dark);
    }
    .nav{
      margin-top:18px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    button{
      border:0;
      border-radius:999px;
      padding:12px 18px;
      font-weight:850;
      cursor:pointer;
      background:var(--ink);
      color:white;
      transition:.18s;
    }
    button.secondary{
      background:var(--soft);
      color:var(--ink);
    }
    button.ghost{
      background:transparent;
      color:var(--accent-dark);
      border:1px solid var(--line);
    }
    button:disabled{
      opacity:.45;
      cursor:not-allowed;
    }
    button:hover:not(:disabled){
      transform:translateY(-1px);
    }

    .result-head{
      text-align:center;
      padding:10px 0 22px;
    }
    .type{
      font-size:clamp(48px, 9vw, 78px);
      font-weight:950;
      letter-spacing:.08em;
      margin:4px 0 0;
      color:var(--ink);
    }
    .archetype{
      font-family: Georgia, serif;
      color:var(--accent-dark);
      font-size:clamp(23px, 4vw, 34px);
      margin:0 0 8px;
      font-weight:700;
    }
    .confidence{
      color:var(--muted);
      margin-top:6px;
    }
    .result-section{
      background:#fffdf7;
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      margin-top:16px;
      line-height:1.58;
    }
    .result-section h3{
      margin:0 0 10px;
      font-size:20px;
      color:var(--ink);
    }
    .portrait{
      font-size:17px;
      color:#44392f;
    }
    .split{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:14px;
    }
    .mini{
      background:#fbf4ea;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
    }
    .mini h4{
      margin:0 0 8px;
      color:var(--accent-dark);
    }
    ul{
      margin:8px 0 0 18px;
      padding:0;
    }
    li{margin:6px 0}
    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-top:16px;
    }
    .dim{
      background:#fffdf7;
      border:1px solid var(--line);
      border-radius:20px;
      padding:15px;
    }
    .dim-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      font-weight:850;
    }
    .dim-name{
      color:var(--muted);
      font-weight:700;
    }
    .scale{
      position:relative;
      height:12px;
      border-radius:999px;
      background:linear-gradient(90deg,#d8c7b5 0 50%, #c7d2c8 50% 100%);
      overflow:visible;
    }
    .pin{
      position:absolute;
      top:-4px;
      width:20px;
      height:20px;
      border-radius:50%;
      background:var(--ink);
      border:3px solid white;
      transform:translateX(-50%);
      box-shadow:0 3px 8px rgba(0,0,0,.18);
    }
    .explain{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
    }
    .note{
      background:#f8f0e3;
      border:1px dashed rgba(156,107,62,.55);
      padding:14px;
      border-radius:18px;
      color:#5a4c40;
      line-height:1.5;
      margin-top:16px;
    }
    .answers{
      margin-top:18px;
      font-size:14px;
      color:var(--muted);
    }
    .answers details{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      background:#fffdf7;
    }
    .answers code{
      white-space:normal;
      color:#5a3b24;
    }
    .tag{
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      background:#efe3d2;
      color:#5a3b24;
      font-size:13px;
      font-weight:800;
      margin:3px;
    }
    @media(max-width:760px){
      .grid,.split{grid-template-columns:1fr}
      .card{padding:16px;border-radius:22px}
      .hero{min-height:140px}
      .hero-text{font-size:18px}
      .question{font-size:20px}
      .nav > div{display:flex;gap:8px;flex-wrap:wrap}
    }
  </style>
</head>

<header>
  
<div style="display:flex;justify-content:center;align-items:center;margin-bottom:14px;">

  <h1>Penjelajahan Diri</h1>
  <p class="subtitle">

</header>


    <main id="root" class="card"></main>

let index = 0;
let answers = Array(QUESTIONS.length).fill(null);

function score(){
  const s = {EI:0,SN:0,TF:0,JP:0};
  const possible = {EI:0,SN:0,TF:0,JP:0};
  answers.forEach((a,i)=>{
    if(a===null) return;
    const c = QUESTIONS[i].choices[a];
    Object.keys(c.w).forEach(k=>s[k]+=c.w[k]);
    Object.keys(DIMS).forEach(k=>{
      let m = Math.max(...QUESTIONS[i].choices.map(choice=>Math.abs(choice.w[k] || 0)));
      possible[k]+=m;
    });
  });
  return {s, possible};
}

function dimensionResult(k,val,max){
  const d = DIMS[k];
  const pct = max ? Math.abs(val)/max : 0;
  const letter = val >= 0 ? d.right : d.left;
  let strength = "borderline";
  if(pct > .70) strength = "kuat";
  else if(pct > .45) strength = "cukup kuat";
  else if(pct > .20) strength = "ringan";
  return {letter, pct, strength};
}

function renderQuestion(){
  const q = QUESTIONS[index];
  const answered = answers.filter(x=>x!==null).length;
  const pct = answered / QUESTIONS.length * 100;
  document.getElementById("root").innerHTML = `
    <div class="hero"><div class="hero-text">${q.scene}</div></div>
    <div class="progress-wrap">
      <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
      <div class="count">${answered}/${QUESTIONS.length}</div>
    </div>
    <div class="question">${index+1}. ${q.q}</div>
    <div class="choices">
      ${q.choices.map((c,i)=>`
        <button class="choice ${answers[index]===i?'selected':''}" onclick="choose(${i})">
          <span class="badge">${String.fromCharCode(65+i)}</span>
          <span>${c.t}</span>
        </button>
      `).join("")}
    </div>
    <div class="nav">
      <button class="secondary" onclick="prev()" ${index===0?'disabled':''}>← Sebelumnya</button>
      <div>
        <button class="ghost" onclick="resetAll()">Reset</button>
        <button onclick="${index===QUESTIONS.length-1?'renderResult()':'next()'}" ${answers[index]===null?'disabled':''}>
          ${index===QUESTIONS.length-1?'Lihat Hasil':'Lanjut →'}
        </button>
      </div>
    </div>
  `;
}

function choose(i){
  answers[index]=i;
  renderQuestion();
}

function next(){
  if(index < QUESTIONS.length-1){ index++; renderQuestion(); }
}

function prev(){
  if(index > 0){ index--; renderQuestion(); }
}

function resetAll(){
  if(confirm("Reset semua jawaban? Karena tentu saja hidup butuh tombol ulang, walau kenyataan tidak sebaik itu.")){
    index=0; answers=Array(QUESTIONS.length).fill(null); renderQuestion();
  }
}

  if(answered < QUESTIONS.length){
    alert("Selesaikan semua pertanyaan dulu.");
    return;

  const results = {};

          <div class="dim">
            <div class="dim-top">
              <span>${d.left} ← ${d.name} → ${d.right}</span>
              <span>${r.letter} · ${r.strength}</span>
            </div>
            <div class="scale"><div class="pin" style="left:${Math.max(0,Math.min(100,pos))}%"></div></div>
            <div class="explain">Skor: ${s[k]} dari ±${possible[k]}. ${d.desc}</div>
          </div>
        `
      }).join("")}
    </div>

    <div class="note">
      ${borderline.length 
        ? `<b>Catatan:</b> Dimensi ${borderline.join(", ")} masih borderline. Sebaiknya hasil tidak dipaksa terlalu kaku, karena manusia bukan file ZIP berisi empat huruf.`
        : `<b>Catatan:</b> Tidak ada dimensi yang sangat borderline. Hasil relatif stabil untuk versi 20 keputusan ini.`}
      <br><br>
      Prototype ini memakai bobot sederhana. Untuk versi matang, pertanyaan bisa dikalibrasi dari data pengguna nyata, lalu item yang lemah dibuang atau diganti.
    </div>

    <div class="answers">
      <details>
        <summary>Lihat jawaban dan bobot teknis</summary>
        <ol>
          ${answers.map((a,i)=>{
            const c = QUESTIONS[i].choices[a];
            return `<li><b>${QUESTIONS[i].q}</b><br>${c.t}<br><code>${JSON.stringify(c.w)}</code></li>`
          }).join("")}
        </ol>
      </details>
    </div>

    <div class="nav">
      <button class="secondary" onclick="index=QUESTIONS.length-1; renderQuestion()">← Edit Jawaban</button>
      <button onclick="resetAll()">Ulangi Tes</button>
    </div>
  `;
}

renderQuestion();
</script>

</body>
</html>
